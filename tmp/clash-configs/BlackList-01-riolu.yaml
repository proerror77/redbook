#---------------------------------+------------------------------------------------------------------------------------+
# 规则库                          |                                                                                    |
#---------------------------------+------------------------------------------------------------------------------------+
#   GeoSite 关键词列表            |  https://github.com/v2fly/domain-list-community/tree/master/data                   |
#   ios_rule_script               |  https://github.com/blackmatrix7/ios_rule_script/tree/master/rule/Clash            |
#   Additional_Rule_For_Clash     |  https://github.com/Accademia/Additional_Rule_For_Clash                            |
