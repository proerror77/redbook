# 'family.cloudflare-dns.com'     : [ '1.0.0.3'         , '1.1.1.3'         ]           # 🇺🇸 Cloudflare Families（恶意软件 / 成人内容过滤） 
# 'family.adguard-dns.com'        : [ '94.140.14.15'    , '94.140.15.16'    ]           # 🇺🇸 AdGuard DNS 家庭保护（成人内容拦截）
# 'unfiltered.adguard-dns.com'    : [ '94.140.14.140'   , '94.140.14.141'   ]           # 🇺🇸 AdGuard DNS 非过滤

#proxy-hosts                      :                                                     # Stash:仅通过节点代理生效
# #'grok.com'                     : [ '104.18.29.234'   , '104.18.29.234'   ]


dns                               :
  enable                          : true                                                # 如果配置为关闭，则将仅仅使用系统 DNS
  prefer-h3                       : false                                               # ⚠️ ⚠️ 需要节点协议支持。 设置：是否开启 DOH 的 http/3（加密DNS请求）
  ipv6                            : false                                               # 设置：是否启动 基于IPV6的DNS查询
  listen                          : '0.0.0.0:1053'                                      # 设置，如何拦截本地所有DNS请求 ： 方法 ，监听本地的53端口 ，如果此选项配置错误，则Clash 的DNS代理分流逻辑将不生效
  use-hosts                       : true                                                # 使用hosts # lookup hosts and return IP record
  use-system-hosts                : true                                                # 
  skip-cert-verify                : false                                               # TLS 握手时是否忽略证书验证    （ 如果设置为 true ，即，跳过证书验证，用来解决部分兼容性问题 ）
 
  proxy-server-nameserver         : [ system ]                                          # 仅用于，代理节点  的 域名解析 
  default-nameserver              : [ system ]                                          # 仅用于，DNS服务器 的 域名解析
  direct-nameserver               :                                                     # 仅用于，直连请求  的 域名解析 (同时请求境内外，通过respect-rules进行分流，以便于同时适配于，肉身出国、肉身回国)
                                    - 'https://dns.alidns.com/dns-query'
                                    - 'https://dns.google/dns-query'      
  nameserver                      :                                                     # 注意：⚠️ iOS（Stash） 对 DNS 数量非常敏感，不建议超过2个（否则会导致：网络内存占用上升超过50MB限制、iOS网络模块频繁崩溃）  ⚠️⚠️⚠️ 注意：follow-rule开启后，域名链接的DNS、DOH ，必须配合GlobalDNS分流策略  ⚠️⚠️⚠️
                                    - 'https://cloudflare-dns.com/dns-query'            # Cloudflare DNS   # 1.1.1.1             1.0.0.1
                                    - 'https://dns.google/dns-query'                    # Google DNS       # 8.8.8.8             8.8.4.4
                                  # - 'https://dns.quad9.net/dns-query'                 # IBM Quad9        # 9.9.9.11            149.112.112.11     
                                  # - 'https://doh.opendns.com/dns-query'               # OpenDNS          # 208.67.220.220      208.67.222.222
                                  # - 'https://doh.dns.sb/dns-query'                    # DNS.SB           # 185.222.222.222     45.11.45.11
                                  # - 'https://dns.adguard-dns.com/dns-query'           # AdGuard          # 94.140.14.14        94.140.15.15
  respect-rules                   : true                                                # Clash.meta 专属。默认为false ： DNS 查询请求，直接出站。true ：DNS查询请求，经rule代理规则转发。 ⚠️⚠️⚠️  建议：使用IP配置节点的Server字段，而非域名，否则应配置 proxy-server-nameserver。详情请看：https://wiki.metacubex.one/config/dns/#_1 
  follow-rule                     : true                                                # Stash      专属。默认为false ： DNS 查询请求，直接出站，true ：DNS查询请求，经rule代理规则转发。 ⚠️⚠️⚠️  建议：使用IP配置节点的Server字段，而非域名，详情请看：https://stash.wiki/features/dns-server
                                                                                        # 请注意：由于 Stash 没有 proxy-server-nameserver字段，所以，开启follow-rule 后，请保证如下规则： 转发 DNS 请求的代理地址为 IP 地址，而不是域名，或 DNS 服务器地址为 IP 地址，而不是域名
  
  enhanced-mode                   : redir-host                                          # 可选值 fake-ip / redir-host ，默认 redir-host   （ ⚠️⚠️⚠️ 注意 ：Stash 3.0 不支持 redir-host ）
  fake-ip-range                   : '198.18.0.1/16'
  fake-ip-filter-mode             : blacklist                                           # 默认 blacklist ：匹配命中的，立刻返回真实IP（不使用Fake IP）。 whitelist ：未匹配命中的默认直接返回真实IP（不使用Fake IP），匹配命中的才使用Fake IP。
  fake-ip-filter                  : [ '+.*' ]                                           # 设置：哪些域名 ，强制只使用 nameserver DNS 进行解析，并立刻返回真实IP ：这里配置为，任何域名，都不会被解析为 fake ip，所有解析请求将会返回它们真实的 IP 地址
 #fallback-filter                 :                                                     # 设置：哪些IP段 ，强制使用 fallback DNS 进行二次解析，

  nameserver-policy               :                                                     # DNS分流规则      

