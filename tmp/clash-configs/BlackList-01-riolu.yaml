                                       'rule-set:GlobalDNS_Domain'                        : [ 'system'                                                                                                                                                    ]   ### [1st-01]          
                                       'rule-set:ChinaDNS_Domain'                         : [ 'system'                                                                                                                                                    ]   ### [1st-01]          
  
  
                                     ###  --------------------------------------------------------------------------------------------------
                                     ###   [1st-02]  DNS分流 ： 局域网
                                     ###  --------------------------------------------------------------------------------------------------
  
                                       'geosite:private'                                  : [ 'system'                                                                                                                                                    ]   ### [1st-02]          
                                       'rule-set:Lan_Do_Resolve'                          : [ 'system'                                                                                                                                                    ]   ### [1st-02]          
  
  
