<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Agent payment permission layer editorial card">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3eb"/>
      <stop offset="1" stop-color="#ece5da"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a3a3"/>
      <stop offset="1" stop-color="#0f6f78"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#1f2a2e" flood-opacity="0.16"/>
    </filter>
    <style>
      .serif { font-family: "Songti SC", "Noto Serif CJK SC", "Source Han Serif SC", serif; }
      .sans { font-family: "PingFang SC", "Noto Sans CJK SC", "Inter", sans-serif; }
      .ink { fill: #20272b; }
      .muted { fill: #697277; }
      .line { stroke: #20272b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thin { stroke: #748087; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .gate { stroke: #129190; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: rgba(22, 163, 163, 0.08); }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#paper)"/>

  <g opacity="0.38">
    <path d="M120 894 C360 812, 502 912, 760 828 S1180 810, 1420 720 S1708 664, 1810 706" class="thin"/>
    <path d="M1240 206 C1340 142, 1460 154, 1568 236 S1758 326, 1832 284" class="thin"/>
  </g>

  <g transform="translate(150 210)">
    <text class="serif ink" x="0" y="0" font-size="82" font-weight="700" letter-spacing="0">Agent 支付的权限层</text>
    <text class="sans muted" x="4" y="78" font-size="38" letter-spacing="0">从建议系统到执行系统</text>

    <g transform="translate(4 178)">
      <rect x="0" y="0" width="430" height="2" fill="#20272b" opacity="0.24"/>
      <circle cx="0" cy="1" r="6" fill="#129190"/>
      <circle cx="215" cy="1" r="6" fill="#129190" opacity="0.65"/>
      <circle cx="430" cy="1" r="6" fill="#129190" opacity="0.35"/>
    </g>

    <text class="sans muted" x="4" y="252" font-size="28">授权 / 限额 / 审计 / 回滚</text>
  </g>

  <g transform="translate(775 178)" filter="url(#softShadow)">
    <rect x="0" y="70" width="370" height="670" rx="42" fill="#fbfaf6" stroke="#d8d1c4" stroke-width="3"/>
    <path d="M88 188 h192" class="thin"/>
    <path d="M88 246 h128" class="thin"/>
    <path d="M88 304 h196" class="thin"/>
    <rect x="88" y="430" width="194" height="92" rx="24" fill="#20272b"/>
    <path d="M128 476 h112" stroke="#f6f1e7" stroke-width="7" stroke-linecap="round"/>
    <circle cx="185" cy="620" r="52" fill="url(#accent)" opacity="0.95"/>
    <path d="M162 620 l18 18 l34 -42" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <g transform="translate(1110 202)">
    <path d="M0 432 C92 390, 142 342, 196 250" class="line"/>
    <path d="M196 250 C230 190, 300 158, 362 190 C416 218, 438 278, 414 330" class="line"/>
    <path d="M414 330 L550 454 C590 490, 592 550, 552 590 C510 632, 446 626, 408 586 L288 466" class="line"/>
    <path d="M276 456 L388 568" class="line"/>
    <path d="M226 506 L322 602" class="line"/>
    <path d="M176 552 L246 622" class="line"/>
    <circle cx="382" cy="286" r="26" fill="#20272b"/>
  </g>

  <g transform="translate(1015 250)">
    <rect x="0" y="0" width="150" height="560" rx="75" class="gate"/>
    <line x1="75" y1="36" x2="75" y2="524" stroke="#129190" stroke-width="3" stroke-dasharray="14 18" opacity="0.55"/>
    <g class="sans" font-size="22" fill="#0f6f78">
      <circle cx="75" cy="132" r="34" fill="#f7f3eb" stroke="#129190" stroke-width="4"/>
      <text x="75" y="140" text-anchor="middle">批</text>
      <circle cx="75" cy="280" r="34" fill="#f7f3eb" stroke="#129190" stroke-width="4"/>
      <text x="75" y="288" text-anchor="middle">额</text>
      <circle cx="75" cy="428" r="34" fill="#f7f3eb" stroke="#129190" stroke-width="4"/>
      <text x="75" y="436" text-anchor="middle">审</text>
    </g>
  </g>

  <g transform="translate(1210 675)" opacity="0.86">
    <path d="M0 0 h112 c22 0 40 18 40 40 v44 c0 22 -18 40 -40 40 H0 c-22 0 -40 -18 -40 -40 V40 C-40 18 -22 0 0 0Z" fill="#fbfaf6" stroke="#20272b" stroke-width="3"/>
    <path d="M-10 46 h92" class="thin"/>
    <path d="M-10 78 h48" class="thin"/>
  </g>

  <g transform="translate(1342 260)" opacity="0.54">
    <circle cx="0" cy="0" r="8" fill="#129190"/>
    <circle cx="108" cy="52" r="8" fill="#129190"/>
    <circle cx="220" cy="-8" r="8" fill="#129190"/>
    <circle cx="320" cy="68" r="8" fill="#129190"/>
    <path d="M0 0 L108 52 L220 -8 L320 68" stroke="#129190" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>

  <g transform="translate(150 918)" class="sans muted" font-size="22">
    <text x="0" y="0">AI Agent payment is becoming execution infrastructure.</text>
  </g>
</svg>
