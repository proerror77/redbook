name: Daily Browser-Free Research

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-browser-free-research
  cancel-in-progress: false

jobs:
  daily-research:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Run Browser-Free Daily Research
        run: bash tools/daily.sh --skip-x

      - name: Commit And Push Reports
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A 05-选题研究 01-内容生产/选题管理/00-选题记录.md
          git commit -m "chore: update browser-free daily research $(TZ=Asia/Shanghai date +%F)"
          git push
