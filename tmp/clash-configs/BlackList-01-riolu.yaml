mode                              : rule                                                # 配置 ： 默认模式                          # 规则模式 (rule)  /  全局翻墙 (global)  /  直连模式 (直连)
mixed-port                        : 7890                                                # 配置 ： 代理服务端口                      # 在同一个端口上，同时提供 HTTP(S) + SOCKS4/5
allow-lan                         : false                                               # 配置 ： 是否允许 局域网代理               # 设置为true以允许来自局域网的其他IP地址（其他终端）的通过Clash翻墙上网。
ipv6                              : false                                               # 配置 ： 是否启用IPv6                      # 当设置为false时，解析器不会将主机名转换为IPv6地址。(默认为 true)
log-level                         : warning                                             # 配置 ： Log记录模式                       # info / warning / error / debug / silent  (设置 Clash 日志输出详细程度（STDOUT）。)
external-controller               : '127.0.0.1:9090'                                    # 配置 ： RESTful web API监听地址
secret                            : ''                                                  # 配置 ： RESTful API的密钥（可选） 
keep-alive-interval               : 60                                                  # TCP 保活间隔时长（默认是15s），缓解移动设备耗电问题    # https://github.com/vernesong/OpenClash/issues/2614
find-process-mode                 : strict                                              # always 开启，强制匹配所有进程 \ strict 默认，由 Clash 判断是否开 \ off 不匹配进程，推荐在路由器上使用此模式
unified-delay                     : true                                                # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异
tcp-concurrent                    : false                                               # TCP 并发 （true会导致移动端费电，如果网络不好，可以启用true） ⚠️ ⚠️ ⚠️


geodata-mode                      : false                                               # 更改 geoip 文件类型 （true为 dat，此项有默认值 false为mmdb）
geodata-loader                    : memconservative                                     # GEO 文件加载模式 :  standard：标准加载器  \  memconservative：专为内存受限 (小内存) 设备优化的加载器 (默认值)
geo-auto-update                   : true                                                # 自动更新GeoIP数据库
geo-update-interval               : 24                                                  # 更新GeoIP数据库的 时间间隔（小时）
geox-url                          :                                                     # GeoIP、GeoSite 数据库
  geoip                           : 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat'                              # https://github.com/Loyalsoldier/geoip
# geosite                         : 'https://cdn.jsdelivr.net/gh/Loyalsoldier/domain-list-custom@release/geosite.dat'               # https://github.com/Loyalsoldier/domain-list-custom            # 不建议：其 geosite:cn 包含超过2万个的非中国域名
  mmdb                            : 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-without-asn.mmdb'               # https://github.com/Loyalsoldier/geoip
  asn                             : 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb'                      # https://github.com/Loyalsoldier/geoip
# --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# geoip                           : 'https://cdn.jsdelivr.net/gh/v2fly/geoip@release/geoip.dat'                                     # https://github.com/v2fly/domain-list-community
  geosite                         : 'https://cdn.jsdelivr.net/gh/v2fly/domain-list-community@release/dlc.dat'                       # https://github.com/v2fly/domain-list-community
# --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# geoip                           : 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat'                  # https://github.com/MetaCubeX/meta-rules-dat
# geosite                         : 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat'                # https://github.com/MetaCubeX/meta-rules-dat
# mmdb                            : 'https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb'               # https://github.com/MetaCubeX/meta-rules-dat
# asn                             : 'https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb'               # https://github.com/MetaCubeX/meta-rules-dat



profile                           :                                                     # 其他首选项
  tracing                         : true                                                # 启用数据跟踪面板
  store-selected                  : true                                                # 储存 API 对策略组的选择，以供下次启动时使用
  store-fake-ip                   : true                                                # 储存 fakeip 映射表，域名再次发生连接时，使用原有映射地址


sniffer                           :                                                     # 设置 ： 嗅探       Clash Meta (Clash Verge Rec) 专用规则
  enable                          : true                                                # 嗅探器开关 :  开启后对 redir-host 类型识别的流量进行强制嗅探       
  override-destination            : false                                               # 是否使用嗅探结果作为实际访问,默认 true    ,全局配置,优先级低于 sniffer.sniff 实际配置 
  sniff                           :
    HTTP                          : { ports : [ 80  , 8080-8880 ]  ,  override-destination : true  }   # HTTP , 默认如果不配置 ports , 默认嗅探  80
    TLS                           : { ports : [ 443 , 8443      ]                                  }   # TLS , 默认如果不配置 ports , 默认嗅探 443
    QUIC                          : { ports : [ 443 , 8443      ]                                  }   # ⚠️ 需要节点协议支持
  force-domain                    : [ '+.v2ex.com'                                                 ]   # 需要强制嗅探的域名（默认情况下只对IP进行嗅探）
  skip-domain                     :                                                     # 需要跳过嗅探的域名。主要解决部分站点sni字段非域名，导致嗅探结果异常的问题，如：米家设备
                                    -  'Mijia Cloud' 
                                    -  'dlg.io.mi.com'  
                                    -  '+.apple.com'  
                                    -  '+.icloud.com'  
                                    -  '+.wechat.com'  
                                    -  '+.qpic.cn'  
                                    -  '+.qq.com'  
                                    -  '+.wechatapp.com'  
                                    -  '+.vivox.com'  
                                    -  '+.oray.com'  
                                    -  '+.sunlogin.net'    


ntp                               :                                                     # 配置：自动同步时间，以防止时间不准导致无法正常联网    
  enable                          : true                                                # 是否同步至系统时间，需要 root/管理员权限
  write-to-system                 : false     
  server                          : 'time.apple.com'         
  benchmark-url                   : 'https://www.apple.com/library/test/success.html'
  benchmark-timeout               : 5 
  port                            : 123             


tun                               :                                                     # 配置：TUN 规则  ,避免 “WebRTC泄露” （泄露 “真实IP”）
  enable                          : true
  auto-detect-interface           : true                                                # 自动检测出口网卡
# include-interface               : [ 'en0'                                 ]           # 手动指定出口网卡（ 多网卡同时连接且自动识别不稳定时使用；Mac 常见 en0=WiFi ）
# exclude-interface               : [ 'en0'                                 ]           # 排除路由的接口（ 与 include-interface 冲突，不可一起配置）
  auto-route                      : true                                                # 自动设置全局路由
# strict-route                    : true                                                # 严格路由（ 防止 IP/DNS 泄露 ，它会把所有网络接口的流量都死死地按在 TUN 接口里 ）。潜在代价：
#                                                                                       #  - Windows  ：开启这个通常会导致 无法开启移动热点，或者 VMware/WSL2 虚拟机无法联网。
#                                                                                       #  - macOS    ：通常问题不大，但如果你发现 Parallels Desktop 或者 Docker 的网络不通了，第一时间把这里改成 false 
# device                          : utun0                                               # 指定 tun 网卡名称，MacOS 只能使用 utun 开头的网卡名
# mtu                             : 9000                                                # 最大传输单元，影响极限速率（10G/高带宽可尝试；默认一般即可 ）
# udp-timeout                     : 300                                                 # UDP NAT 过期时间（秒），默认 300
# endpoint-independent-nat        : false                                               # 独立于端点的 NAT（ 性能可能略降，不需要时不建议开启 ）
# auto-redirect                   : true                                                # 仅 Linux ：自动配置 iptables/nftables 重定向 TCP 连接（路由器/OpenClash 可考虑开启，需 auto-route ）
# gso                             : true                                                # 仅 Linux ：启用 GSO（提升吞吐；部分场景可能略增延迟）
# gso-max-size                    : 65536                                               # 仅 Linux ：GSO 数据块最大长度
# iproute2-table-index            : 2022                                                # 仅 Linux ：auto-route 生成的路由表索引，默认 2022
# iproute2-rule-index             : 9000                                                # 仅 Linux ：auto-route 生成的规则起始索引，默认 9000
  stack                           : system                                              # 配置TUN使用哪种核心，自带核心（ gvisor ），系统核心（ system ），混合核心（ mixed ）。 ⚠️ gvisor 在 Mac OS上 对IPv6兼容不佳
  dns-hijack                      : [ 'any:53'         , 'tcp://any:53'     ]           # 把所有 DNS（53 端口）交给内置 DNS 处理，防止 DNS 走直连
# route-exclude-address           :                                                     # 哪些网段 被排除。即，不被 TUN 代理（减少TUN负载 ）  
#                                   - '192.168.0.0/16'                                  # RFC1918 全排除（按需启用）      
#                                   - '10.0.0.0/8'                                      # RFC1918 全排除（按需启用）      
#                                   - '172.16.0.0/12'                                   # RFC1918 全排除（按需启用）      
#                                 # - 'fc00::/7'                                        # 可选：排除 ULA/Link-Local（通常不需要，已由 2000::/3 覆盖公网）
#                                 # - 'fe80::/10'                                       # 可选：排除 ULA/Link-Local（通常不需要，已由 2000::/3 覆盖公网） 
# route-address                   :                                                     # 哪些网段 被包含。即，必须被 TUN 强制接管      # ⚠️⚠️⚠️⚠️ 强烈不建议启用 ❕❕❕❕❕ 非常容易造成回环 ❕ 如果启用 route-address，必须将所有用到的代理节点和DNS都配置到 route-exclude-address 中。不然 100%造成回环 ，维护成本极差！！       
#                                 # - '0.0.0.0/0'                                       # 老写法中 ，IPv4 默认全走 TUN，新写法需显式声明
#                                   - '2000::/3'                                        # 仅让公网 IPv6通过 TUN，避免 IPv6 泄漏，同时保留本地 IPv6 直连

hosts                             :                                                     # Clash:全局生效 / Stash:仅direct生效 
  '+.clash.dev'                   : [ '127.0.0.1'                           ]           # 支持通配符域名 (例如: *.clash.dev, *.foo.*.example.com 。+.foo.com 的效果等同于 .foo.com 和 foo.com)
  '+.stash.dev'                   : [ '127.0.0.1'                           ]                     
