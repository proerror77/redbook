<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./style.css">
  <title>从流程试点到 Agent OS</title>
  <style>
    .header { position: absolute; left: 112px; top: 86px; width: 1100px; }
    .road { position: absolute; left: 150px; right: 150px; top: 548px; height: 18px; background: #26302c; }
    .road::after { content: ""; position: absolute; right: -42px; top: -27px; border-top: 36px solid transparent; border-bottom: 36px solid transparent; border-left: 58px solid #26302c; }
    .stage { position: absolute; top: 410px; width: 360px; height: 300px; border: 4px solid #26302c; background: rgba(255,255,255,.58); padding: 34px; box-shadow: 0 16px 40px rgba(32,36,34,.07); }
    .stage h2 { margin: 0 0 30px; font-size: 34px; line-height: 1.15; }
    .stage .pill { display: block; margin: 14px 0; font-size: 22px; padding: 12px 16px; }
    .a { left: 156px; } .b { left: 590px; } .c { left: 1024px; }
    .os { position: absolute; right: 112px; top: 372px; width: 420px; height: 390px; border: 4px solid #26302c; background: #e9dfcf; padding: 34px; }
    .os h2 { margin: 0; font-size: 42px; line-height: 1.05; }
    .mini { position: absolute; width: 124px; height: 66px; border: 2px solid #26302c; background: #fbfaf5; display: flex; align-items: center; justify-content: center; font-size: 21px; font-weight: 820; }
    .m1 { left: 34px; top: 142px; } .m2 { right: 34px; top: 142px; } .m3 { left: 34px; top: 238px; } .m4 { right: 34px; top: 238px; } .m5 { left: 148px; top: 190px; background: #f6f3ec; }
  </style>
</head>
<body>
  <main class="board">
    <section class="header">
      <div class="eyebrow">90-Day Pilot Path</div>
      <h1 class="title" style="font-size:86px;">从流程试点到 Agent OS</h1>
      <p class="subtitle" style="font-size:34px;width:860px;">先把 1-3 个高价值流程改造成 AI 可理解、可执行、可治理的系统，再逐步扩张。</p>
    </section>
    <div class="road"></div>
    <section class="stage a">
      <h2>1. 成熟度诊断</h2>
      <span class="pill">流程盘点</span>
      <span class="pill">数据地图</span>
      <span class="pill">90 天路线图</span>
    </section>
    <section class="stage b">
      <h2>2. 数据与流程重整</h2>
      <span class="pill">SOP</span>
      <span class="pill">数据字典</span>
      <span class="pill">权限矩阵</span>
    </section>
    <section class="stage c">
      <h2>3. 数字员工试点</h2>
      <span class="pill">1-3 个 Agent</span>
      <span class="pill">审批机制</span>
      <span class="pill">日志评估</span>
    </section>
    <section class="os">
      <h2>企业级<br><span class="teal">Agent OS</span></h2>
      <div class="mini m1">流程</div>
      <div class="mini m2">数据</div>
      <div class="mini m3">权限</div>
      <div class="mini m4">评估</div>
      <div class="mini m5">治理</div>
    </section>
    <div class="footer">不要越级建设：从高价值流程开始，建立可复盘的组织系统。</div>
  </main>
</body>
</html>
